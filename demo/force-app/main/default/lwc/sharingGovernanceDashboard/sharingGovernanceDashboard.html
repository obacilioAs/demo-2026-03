<template>
    <lightning-card title={cardTitle} icon-name="custom:custom48">
        
        <div class="slds-p-around_medium container-layout">
            
            <!-- Health Meter / Progress Ring -->
            <div class="health-meter-container slds-m-bottom_medium">
                <div class={progressRingClass}>
                    <lightning-progress-ring 
                        value={healthScore} 
                        variant={ringVariant} 
                        size="large">
                    </lightning-progress-ring>
                    <div class="health-text slds-text-heading_medium slds-m-top_small {textColorClass}">
                        {healthScore}%
                    </div>
                </div>
            </div>
            
            <!-- Status Details -->
            <div class="status-details slds-m-bottom_large slds-text-align_center">
                <p class="slds-text-body_regular slds-m-bottom_x-small">{statusMessage}</p>
                
                <template if:true={hasDiscrepancies}>
                    <p class="slds-text-color_error slds-text-title_bold slds-m-bottom_x-small">
                        Found {missingShares} Missing/Incorrect Shares!
                    </p>
                    <template if:true={reportId}>
                        <a onclick={handleDownloadReport} class="slds-text-link">Download Latest Discrepancy Report</a>
                    </template>
                </template>
                <template if:false={hasDiscrepancies}>
                    <p class="slds-text-color_success slds-text-title_bold">Perfect! All shares are synchronized.</p>
                </template>
            </div>
            
            <!-- Global Action (Only for Home Page) -->
            <template if:true={isHomePage}>
                <div class="slds-text-align_center slds-border_top slds-p-top_medium">
                    <lightning-button-group>
                        <lightning-button 
                            label="Trigger System Audit" 
                            variant="brand" 
                            icon-name="utility:sync" 
                            onclick={handleTriggerAudit}
                            disabled={isAuditing}>
                        </lightning-button>
                        <lightning-button-icon 
                            icon-name="utility:refresh" 
                            variant="brand" 
                            alternative-text="Refresh Health Data" 
                            title="Refresh Health Data"
                            onclick={handleRefreshData}
                            disabled={isRefreshing}>
                        </lightning-button-icon>
                    </lightning-button-group>
                </div>
            </template>
            
            <!-- Record Page Actions -->
            <template if:false={isHomePage}>
                <div class="slds-text-align_center slds-border_top slds-p-top_medium">
                    <lightning-button 
                        label="Refresh Data" 
                        variant="brand-outline" 
                        icon-name="utility:refresh" 
                        onclick={handleRefreshData}
                        disabled={isRefreshing}>
                    </lightning-button>
                </div>
            </template>
            
        </div>
        
    </lightning-card>
</template>
